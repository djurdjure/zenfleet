name: ZenFleet CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Tests PHP (PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:18-3.6-alpine
        env:
          POSTGRES_DB: zenfleet_test
          POSTGRES_USER: zenfleet_user
          POSTGRES_PASSWORD: zenfleet_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zenfleet_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      APP_KEY: base64:8WWgKSWhsypIcEcojZl8q9k0HmecY7oORuGSQCjHmMs=
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: zenfleet_test
      DB_USERNAME: zenfleet_user
      DB_PASSWORD: zenfleet_pass
      CACHE_DRIVER: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pgsql, mbstring, xml, bcmath, gd, zip, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: RBAC Freeze Guardrail
        run: php artisan rbac:freeze-check

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend
        run: yarn build

      - name: Enable PostGIS
        run: |
          PGPASSWORD=zenfleet_pass psql -h 127.0.0.1 -U zenfleet_user -d zenfleet_test \
            -c "CREATE EXTENSION IF NOT EXISTS postgis;"
          PGPASSWORD=zenfleet_pass psql -h 127.0.0.1 -U zenfleet_user -d zenfleet_test \
            -c "CREATE EXTENSION IF NOT EXISTS btree_gist;"

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test --parallel

  lint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Laravel Pint
        run: vendor/bin/pint --test
